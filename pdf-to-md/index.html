<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to MD</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; background: #0a0a0a; }
        .drop-zone { border: 3px dashed #4b5563; transition: all 0.3s ease; }
        .drop-zone.dragover { border-color: #22c55e; background: #052e16; transform: scale(1.02); }
    </style>
</head>
<body class="text-zinc-200">
    <div class="max-w-2xl mx-auto p-8">
        <div class="text-center mb-12">
            <h1 class="text-6xl font-bold tracking-tighter text-white mb-2">PDF → MD</h1>
            <p class="text-emerald-400">Python running in your browser (Pyodide)</p>
        </div>

        <div id="loading" class="text-center py-20">
            <div class="inline-block">
                <div class="w-8 h-8 border-4 border-emerald-400 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
                <div class="text-emerald-400 font-medium">Loading Python environment...</div>
                <div class="text-xs text-zinc-500 mt-8 max-w-xs mx-auto">
                    First load takes 15-30 seconds (downloads ~15MB). After that it's cached.
                </div>
            </div>
        </div>

        <div id="app" class="hidden">
            <div id="upload-area" class="drop-zone bg-zinc-900 border-dashed rounded-3xl p-20 text-center cursor-pointer mb-8">
                <div class="mx-auto w-24 h-24 bg-emerald-500/10 text-emerald-400 rounded-3xl flex items-center justify-center text-6xl mb-8">
                    📄
                </div>
                <h2 class="text-4xl font-medium text-white mb-4">Drop your PDF here</h2>
                <p class="text-zinc-400 text-lg max-w-xs mx-auto">
                    Real Python code will convert it to Markdown
                </p>
                <input type="file" id="file-input" accept="application/pdf" class="hidden">
                <button onclick="document.getElementById('file-input').click()" 
                        class="mt-8 bg-white text-black px-10 py-4 rounded-2xl font-medium text-base hover:bg-zinc-100 transition-all active:scale-95">
                    Or select a file
                </button>
            </div>

            <div id="status" class="hidden text-center py-16">
                <div class="flex flex-col items-center gap-6">
                    <div class="w-8 h-8 border-4 border-emerald-400 border-t-transparent rounded-full animate-spin"></div>
                    <div class="text-emerald-400 font-medium">Running Python conversion...</div>
                </div>
            </div>

            <div id="result" class="hidden">
                <div class="bg-zinc-900 rounded-3xl p-8 mb-8">
                    <div class="flex justify-between items-center mb-6">
                        <div class="text-emerald-400 font-medium flex items-center gap-2">
                            <span>✓</span> 
                            <span>Your Markdown is ready</span>
                        </div>
                        <div onclick="copyToClipboard()" class="cursor-pointer text-xs flex items-center gap-2 text-zinc-400 hover:text-white">
                            📋 Copy
                        </div>
                    </div>
                    <pre id="md-output" class="bg-black p-8 rounded-2xl text-zinc-300 overflow-auto max-h-[420px] whitespace-pre-wrap border border-zinc-800 text-sm font-mono"></pre>
                </div>
                
                <button onclick="downloadMD()" 
                        class="w-full py-6 bg-emerald-500 hover:bg-emerald-600 active:bg-emerald-700 transition-all text-white font-semibold text-xl rounded-3xl flex items-center justify-center gap-3">
                    ⬇️ Download .md File
                </button>
            </div>
        </div>
    </div>

    <script>
        let pyodide;
        let currentMD = '';
        let currentFilename = 'converted';

        const loadingEl = document.getElementById('loading');
        const appEl = document.getElementById('app');
        const dropZone = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const statusEl = document.getElementById('status');
        const resultEl = document.getElementById('result');
        const mdOutput = document.getElementById('md-output');

        async function main() {
            try {
                pyodide = await loadPyodide();
                await pyodide.loadPackage("micropip");
                const micropip = pyodide.pyimport("micropip");
                await micropip.install("pypdf");
                console.log("%cPython + pypdf is ready in the browser", "color:#22c55e");
                
                loadingEl.classList.add('hidden');
                appEl.classList.remove('hidden');
            } catch (err) {
                console.error(err);
                loadingEl.innerHTML = `<div class="text-red-400">Failed to load Python. Please try the desktop Python tool instead.</div>`;
            }
        }

        async function processPDF(file) {
            statusEl.classList.remove('hidden');
            resultEl.classList.add('hidden');
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                
                let fullText = '';
                let links = [];
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    fullText += textContent.items.map(item => item.str).join(' ') + '\n\n';
                    
                    // Extract hyperlinks
                    const annotations = await page.getAnnotations();
                    for (let ann of annotations) {
                        if (ann.subtype === 'Link' && ann.url) {
                            links.push({
                                page: i,
                                url: ann.url,
                                text: 'LINK' // We would ideally match this to nearby text
                            });
                        }
                    }
                }
                
                let md = `# ${file.name.replace(/\\.pdf$/i, '')}\\n\\n`;
                md += fullText.replace(/\n{3,}/g, '\n\n').trim();
                
                if (links.length > 0) {
                    md += '\\n\\n---\\n\\n**Extracted Hyperlinks:**\\n';
                    links.forEach((link, i) => {
                        md += `${i+1}. [Link ${i+1}](${link.url})\\n`;
                    });
                }
                
                currentMD = md;
                currentFilename = file.name.replace(/\\.pdf$/i, '');
                mdOutput.textContent = md;
                
                statusEl.classList.add('hidden');
                resultEl.classList.remove('hidden');
                
                console.log(`✅ Processed PDF with ${pdf.numPages} pages and ${links.length} links`);
            } catch (err) {
                console.error('PDF processing error:', err);
                statusEl.innerHTML = `
                    <div class="text-red-400 text-center py-8">
                        <div class="text-4xl mb-4">⚠️</div>
                        <div class="font-medium mb-2">Processing failed</div>
                        <div class="text-sm max-w-xs mx-auto">
                            ${err.message}<br><br>
                            Try a different PDF.
                        </div>
                        <button onclick="location.reload()" class="mt-8 px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-xs">
                            Start Over
                        </button>
                    </div>`;
            }
        }

        // Drag & drop and file selection (same as before)
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', async e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file?.type === 'application/pdf') await processPDF(file);
        });

        fileInput.addEventListener('change', async e => {
            const file = e.target.files[0];
            if (file) await processPDF(file);
        });

        function downloadMD() {
            if (!currentMD) return;
            const blob = new Blob([currentMD], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = currentFilename + '.md';
            a.click();
            URL.revokeObjectURL(url);
        }

        function copyToClipboard() {
            if (!currentMD) return;
            navigator.clipboard.writeText(currentMD).then(() => {
                const orig = event.target.textContent;
                event.target.textContent = '✅ Copied!';
                setTimeout(() => event.target.textContent = orig, 2000);
            });
        }

        window.downloadMD = downloadMD;
        window.copyToClipboard = copyToClipboard;

        // Start loading Python
        main();
    </script>
</body>
</html>
